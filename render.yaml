# Render Blueprint for LUXE
# Deploy both services at once: Render Dashboard → New → Blueprint → pick this repo.
# Docs: https://render.com/docs/blueprint-spec
#
# After the first deploy you must set the cross-service URLs (see DEPLOYMENT.md):
#   - luxe-api  -> CLIENT_URL            = https://luxe-web.onrender.com
#   - luxe-web  -> NEXT_PUBLIC_API_URL   = https://luxe-api.onrender.com/api
# Secrets marked `sync: false` are entered in the Render dashboard, never committed.

services:
  # ---------- Express + MongoDB API ----------
  - type: web
    name: luxe-api
    runtime: node
    rootDir: backend
    plan: free
    region: oregon
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      # Render injects PORT automatically; the server reads process.env.PORT.
      - key: MONGO_URI
        sync: false # paste your MongoDB Atlas connection string
      - key: JWT_SECRET
        generateValue: true # Render generates a strong secret for you
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: STRIPE_SECRET_KEY
        sync: false # sk_test_... or sk_live_...
      - key: STRIPE_WEBHOOK_SECRET
        sync: false # whsec_... from the Stripe webhook you create
      - key: STRIPE_CURRENCY
        value: usd
      - key: CLIENT_URL
        sync: false # set to the luxe-web URL after first deploy

  # ---------- Next.js storefront ----------
  - type: web
    name: luxe-web
    runtime: node
    rootDir: frontend
    plan: free
    region: oregon
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      # NEXT_PUBLIC_* vars are baked in at BUILD time — changing them needs a rebuild.
      - key: NEXT_PUBLIC_API_URL
        sync: false # https://luxe-api.onrender.com/api
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false # pk_test_... or pk_live_...
